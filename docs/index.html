<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Fantasia Pythonica</title>
    <link rel="icon" href="./assets/icons/favicon_pythonica.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/game.css">
</head>
<body>

<button
    id="menuButton"
    class="menu-button"
    type="button"
    aria-label="Open menu"
    aria-expanded="false"
>
    <span></span>
    <span></span>
    <span></span>
</button>

<div
    id="menuOverlay"
    class="menu-overlay hidden"
>
    <nav
        id="sideMenu"
        class="side-menu"
        aria-label="Main menu"
    >
        <div class="side-menu-header">
            <h2 id="menuTitle">Menu</h2>

            <button
                id="closeMenuButton"
                class="close-menu-button"
                type="button"
                aria-label="Close menu"
            >
                ×
            </button>
        </div>

        <button
            id="memoryButton"
            class="menu-item menu-item-button"
            type="button"
        >
            Memory
        </button>

        <a
            id="grimoireLink"
            class="menu-item"
            href="./grimoire.html"
        >
            Grimoire / 魔導書
        </a>
    </nav>
</div>

<div
    id="memoryModal"
    class="memory-modal hidden"
>
    <section
        class="memory-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="memoryTitle"
    >
        <header class="memory-header">
            <h2 id="memoryTitle">Memory</h2>

            <button
                id="closeMemoryButton"
                class="memory-close-button"
                type="button"
                aria-label="Close"
            >
                ×
            </button>
        </header>

        <p id="memoryDescription" class="memory-description">
            魔導書に刻まれた記憶
        </p>

        <div id="memoryChapterList" class="memory-chapter-list"></div>
    </section>
</div>

<div
    id="replayQuestionModal"
    class="replay-question-modal hidden"
>
    <section
        class="replay-question-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="replayQuestionText"
    >
        <p id="replayQuestionText"></p>

        <div class="replay-question-actions">
            <button
                id="playQuestionButton"
                type="button"
            ></button>

            <button
                id="skipQuestionButton"
                type="button"
            ></button>
        </div>
    </section>
</div>

<div id="flashOverlay" class="hidden"></div>
<div id="titleScreen">
    <h1>La Fantasia Pythonica</h1>

    <button id="startJaButton">日本語で始める</button>
    <button id="startEnButton">Start in English</button>
</div>

<div id="contractScreen" class="hidden">
    <h2 id="contractTitle"></h2>

    <div id="parchment">
        <p id="contractText"></p>

        <div id="nameAssignment">
        <span>name = "</span>

        <input
            id="nameInput"
            type="text"
            autocomplete="off"
        >

        <span>"</span>
    </div>

    <button id="signButton"></button>
    </div>
</div>

<div id="gameScreen" class="hidden">
    <div id="messageBox">
        <div id="speaker"></div>
        <div id="message"></div>
        <div id="clickHint">
            <span id="clickText"></span>
            <span id="arrow">▶︎</span>
        </div>
    </div>

    <div id="codeScreen" class="hidden">
        <div id="codePanel">
            <p id="instruction"></p>
            <div id="editor">
                <pre id="lineNumbers">1</pre>
                <textarea id="codeInput"></textarea>
            </div>
            <div id="codeButtons">
                <button id="futureSightButton"></button>
                <button id="runButton"></button>
            </div>
            <pre id="console">
                <span id="consoleText"></span>
            </pre>
            <div id="successHint" class="hidden">
                <span id="successText"></span>
                <span id="successArrow">▶︎</span>
            </div>
        </div>
    </div>

    <div id="toBeContinued" class="hidden">
        To Be Continued...
    </div>
</div>

<div id="chapterTitleScreen" class="hidden">
    <div id="chapterNumber"></div>
    <div id="chapterTitleText"></div>
</div>
<script src="./js/ui-text.js"></script>
<script src="./js/chapters/chapter000.js"></script>
<script src="./js/chapters/chapter001.js"></script>
<script src="./js/chapters/chapter002.js"></script>
<script src="./js/main.js"></script>

</body>
</html>
